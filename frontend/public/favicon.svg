<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">

  <!-- Serif L -->
  <g fill="#c8951a">
    <!-- vertical stroke -->
    <rect x="116" y="28" width="14" height="168"/>
    <!-- top serif (wide crossbar) -->
    <rect x="94"  y="28" width="58"  height="6"/>
    <!-- bottom foot -->
    <rect x="116" y="188" width="68" height="9"/>
    <!-- bottom-right foot serif -->
    <rect x="180" y="194" width="10" height="4"/>
    <!-- bottom-left foot serif -->
    <rect x="106" y="188" width="12" height="5"/>
  </g>

  <!-- Superscript 2 -->
  <text x="140" y="96"
        font-family="Georgia,'Times New Roman',serif"
        font-size="34" font-weight="400"
        fill="#c8951a">2</text>

  <!-- Calligraphic orbital swoosh — single open stroke -->
  <path
    d="M 105,50
       C 125,42  158,52  172,80
       C 186,108 178,145 158,168
       C 136,193 100,204  70,197
       C 44,190  30,172  40,154
       C 50,138  72,133  95,140
       C 112,145 126,158 136,170
       C 150,186 166,202 186,210
       C 198,216 208,212 204,204"
    fill="none"
    stroke="#c8951a"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"/>

</svg>
